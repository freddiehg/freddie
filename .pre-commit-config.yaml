fail_fast: true
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        exclude: ^docs-website/static/img/
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
  - repo: local
    hooks:
      # These three mirror .github/workflows/ci.yml exactly, so a commit that would
      # fail CI fails here first.
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-test
        name: cargo test
        entry: cargo test --all --all-features
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-lock-sync
        name: cargo lock in sync
        entry: bash -c 'cargo metadata --format-version 1 --locked >/dev/null'
        language: system
        files: (^|/)Cargo\.(toml|lock)$
        pass_filenames: false
