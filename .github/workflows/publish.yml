name: Publish

# Publishes the stub (0.0.1) crates to crates.io. `|| true` tolerates an
# already-published version, so repeated commits don't fail once 0.0.1 exists.
# Replace with real version bumping when the crates have real content.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --all
      - name: Publish stub crates (0.0.1)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p rayban_macro || true
          cargo publish -p rayban || true
          cargo publish -p freddie || true
