name: CI

on: [push, pull_request]

jobs:
  cargo-fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  cargo-clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - name: Run cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  cargo-test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Run cargo test
        run: cargo test --all

  all-checks-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [cargo-fmt, cargo-clippy, cargo-test]
    steps:
      - name: Do nothing
        run: echo "all checks passed"

  # Push to master -> publish a snapshot version of every crate: 0.0.0-main.<run>.
  main-release:
    name: Main release (crates.io snapshot)
    runs-on: ubuntu-latest
    needs: [all-checks-passed]
    if: >-
      github.event_name == 'push' &&
      github.repository == 'freddiehg/freddie' &&
      github.ref == 'refs/heads/master' &&
      github.ref_type != 'tag'
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Set snapshot version
        run: |
          BASE=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          VERSION="${BASE}-main.${{ github.sha }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          echo "publishing $VERSION"
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p rayban_macro --allow-dirty
          cargo publish -p rayban --allow-dirty
          cargo publish -p freddie --allow-dirty

  # Push a v* tag -> publish that exact version of every crate.
  versioned-release:
    name: Versioned release (crates.io)
    runs-on: ubuntu-latest
    needs: [all-checks-passed]
    if: >-
      github.event_name == 'push' &&
      github.repository == 'freddiehg/freddie' &&
      github.ref_type == 'tag' &&
      startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          echo "publishing $VERSION"
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p rayban_macro --allow-dirty
          cargo publish -p rayban --allow-dirty
          cargo publish -p freddie --allow-dirty
