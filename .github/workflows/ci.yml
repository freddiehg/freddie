name: CI

on: [push, pull_request]

jobs:
  cargo-fmt:
    name: cargo fmt
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  cargo-clippy:
    name: cargo clippy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.96.0"
          components: clippy
      - name: Run cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  cargo-test:
    name: cargo test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.96.0"
      - name: Run cargo test
        run: cargo test --all --all-features
      # `--all-features` turns on mercury's `typescript` feature, so the line above regenerated the
      # extension's wire types. If that changed anything, what is checked in was stale.
      - name: Wire types are up to date
        run: git diff --exit-code chrome-extension/src/wire/

  # The two crates with no macOS-only dependency, built and tested on the other platforms they are
  # meant to run on. `-p` rather than the workspace, because everything else in it binds to AppKit
  # and will not build here. See `refactors/pending/freddie-cli-off-macos.md`.
  portable:
    name: portable crates
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.96.0"
          components: clippy
      - name: Run cargo clippy
        run: cargo clippy -p freddie_cli -p freddie_single_instance --all-targets -- -D warnings
      - name: Run cargo test
        run: cargo test -p freddie_cli -p freddie_single_instance

  extension:
    name: extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chrome-extension
    steps:
      - uses: actions/checkout@v4
      # `defaults.run.working-directory` does not reach an action's own steps, so this
      # one is told where the package.json naming the pnpm version lives.
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: chrome-extension/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: chrome-extension/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run format:check

  build-website:
    name: Build website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-website
    steps:
      - uses: actions/checkout@v4
      # `defaults.run.working-directory` does not reach an action's own steps, so this
      # one is told where the package.json naming the pnpm version lives.
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: docs-website/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs-website/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-website/build

  all-checks-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [cargo-fmt, cargo-clippy, cargo-test, portable, extension, build-website]
    steps:
      - name: Do nothing
        run: echo "all checks passed"

  # The site goes out only behind `all-checks-passed`, so a red build never deploys.
  # The artifact comes from `build-website` in this same run.
  deploy-website:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [all-checks-passed]
    if: >-
      github.event_name == 'push' &&
      github.repository == 'freddiehg/freddie' &&
      github.ref == 'refs/heads/master'
    # On the job rather than the workflow: two CI runs may overlap freely, but two
    # deployments of the same site may not.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Push to master -> publish a snapshot version of every crate: 0.0.0-main.<run>.
  main-release:
    name: Main release (crates.io snapshot)
    runs-on: ubuntu-latest
    needs: [all-checks-passed]
    if: >-
      github.event_name == 'push' &&
      github.repository == 'freddiehg/freddie' &&
      github.ref == 'refs/heads/master' &&
      github.ref_type != 'tag'
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.96.0"
      - name: Set snapshot version
        run: |
          BASE=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          VERSION="${BASE}-main-${GITHUB_SHA::7}"
          # Rewrite the workspace version and the path-dependency version specifiers.
          for f in Cargo.toml crates/*/Cargo.toml; do
            sed -i "s|\"$BASE\"|\"$VERSION\"|g" "$f"
          done
          # Pin inter-crate dependencies to the exact version (a prerelease req is a
          # caret range, which would otherwise match an older sibling prerelease).
          for f in crates/*/Cargo.toml; do
            sed -i "s|version = \"$VERSION\"|version = \"=$VERSION\"|g" "$f"
          done
          echo "publishing $VERSION"
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p laserbeam --allow-dirty
          # freddie is not published here. It depends on the workspace's `bind`, and the
          # name `bind` on crates.io belongs to someone else, so the dependency cannot be
          # resolved from the registry at any version. Publishing freddie again means
          # renaming that crate to a free name and publishing the chain beneath it
          # (derive_support, bind_macro, bind, freddie_keys), none of which are on
          # crates.io yet. The `freddie` name itself is already reserved by the versions
          # published up to 0.0.1-main-f0d4d72.

  # Push a v* tag -> publish that exact version of every crate.
  versioned-release:
    name: Versioned release (crates.io)
    runs-on: ubuntu-latest
    needs: [all-checks-passed]
    if: >-
      github.event_name == 'push' &&
      github.repository == 'freddiehg/freddie' &&
      github.ref_type == 'tag' &&
      startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.96.0"
      - name: Set version from tag
        run: |
          BASE=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          VERSION="${GITHUB_REF_NAME#v}"
          # Rewrite the workspace version and the path-dependency version specifiers.
          for f in Cargo.toml crates/*/Cargo.toml; do
            sed -i "s|\"$BASE\"|\"$VERSION\"|g" "$f"
          done
          # Pin inter-crate dependencies to the exact version.
          for f in crates/*/Cargo.toml; do
            sed -i "s|version = \"$VERSION\"|version = \"=$VERSION\"|g" "$f"
          done
          echo "publishing $VERSION"
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p laserbeam --allow-dirty
          # freddie is not published here. It depends on the workspace's `bind`, and the
          # name `bind` on crates.io belongs to someone else, so the dependency cannot be
          # resolved from the registry at any version. Publishing freddie again means
          # renaming that crate to a free name and publishing the chain beneath it
          # (derive_support, bind_macro, bind, freddie_keys), none of which are on
          # crates.io yet. The `freddie` name itself is already reserved by the versions
          # published up to 0.0.1-main-f0d4d72.
