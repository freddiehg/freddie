name: CI

on: [push, pull_request]

jobs:
  cargo-fmt:
    name: cargo fmt
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  cargo-clippy:
    name: cargo clippy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.96.0"
          components: clippy
      - name: Run cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  cargo-test:
    name: cargo test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.96.0"
      - name: Run cargo test
        run: cargo test --all --all-features
      # `--all-features` turns on mercury's `typescript` feature, so the line above regenerated the
      # extension's wire types. If that changed anything, what is checked in was stale.
      - name: Wire types are up to date
        run: git diff --exit-code chrome-extension/src/wire/

  extension:
    name: extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chrome-extension
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: chrome-extension/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run format:check

  all-checks-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [cargo-fmt, cargo-clippy, cargo-test, extension]
    steps:
      - name: Do nothing
        run: echo "all checks passed"

  # Push to master -> publish a snapshot version of every crate: 0.0.0-main.<run>.
  main-release:
    name: Main release (crates.io snapshot)
    runs-on: ubuntu-latest
    needs: [all-checks-passed]
    if: >-
      github.event_name == 'push' &&
      github.repository == 'freddiehg/freddie' &&
      github.ref == 'refs/heads/master' &&
      github.ref_type != 'tag'
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.96.0"
      - name: Set snapshot version
        run: |
          BASE=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          VERSION="${BASE}-main-${GITHUB_SHA::7}"
          # Rewrite the workspace version and the path-dependency version specifiers.
          for f in Cargo.toml crates/*/Cargo.toml; do
            sed -i "s|\"$BASE\"|\"$VERSION\"|g" "$f"
          done
          # Pin inter-crate dependencies to the exact version (a prerelease req is a
          # caret range, which would otherwise match an older sibling prerelease).
          for f in crates/*/Cargo.toml; do
            sed -i "s|version = \"$VERSION\"|version = \"=$VERSION\"|g" "$f"
          done
          echo "publishing $VERSION"
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p laserbeam --allow-dirty
          cargo publish -p freddie --allow-dirty

  # Push a v* tag -> publish that exact version of every crate.
  versioned-release:
    name: Versioned release (crates.io)
    runs-on: ubuntu-latest
    needs: [all-checks-passed]
    if: >-
      github.event_name == 'push' &&
      github.repository == 'freddiehg/freddie' &&
      github.ref_type == 'tag' &&
      startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.96.0"
      - name: Set version from tag
        run: |
          BASE=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          VERSION="${GITHUB_REF_NAME#v}"
          # Rewrite the workspace version and the path-dependency version specifiers.
          for f in Cargo.toml crates/*/Cargo.toml; do
            sed -i "s|\"$BASE\"|\"$VERSION\"|g" "$f"
          done
          # Pin inter-crate dependencies to the exact version.
          for f in crates/*/Cargo.toml; do
            sed -i "s|version = \"$VERSION\"|version = \"=$VERSION\"|g" "$f"
          done
          echo "publishing $VERSION"
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p laserbeam --allow-dirty
          cargo publish -p freddie --allow-dirty
